<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visual Stress Test - Cloud Bus Pass</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 400px; margin: 0 auto 20px; position: sticky; top: 20px; z-index: 100; }
        .btn-stress { background: #ea4335; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Ticket Grid */
        #ticket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 20px; }
        .mini-ticket { background: #fff; border: 1px solid #1a73e8; border-left: 5px solid #1a73e8; padding: 8px; border-radius: 5px; font-size: 10px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); animation: popIn 0.2s ease-out; }
        .ticket-id { font-weight: bold; color: #1a73e8; }
        
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .stats { font-size: 14px; font-weight: bold; margin: 10px 0; color: #5f6368; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚌 Cloud Bus Pass</h2>
    <p style="font-size: 12px; color: gray;">Testing High Availability & Mass Generation</p>
    
    <div class="stats">Tickets Generated: <span id="count" style="color:#1a73e8;">0</span></div>
    <button class="btn-stress" onclick="runMassiveGeneration()">🚀 Generate 1000 Tickets Instantly</button>
    <p id="timer" style="font-size: 11px; margin-top: 10px;"></p>
</div>

<div id="ticket-grid"></div>

<script>
    function runMassiveGeneration() {
        const grid = document.getElementById('ticket-grid');
        const countDisplay = document.getElementById('count');
        const timerDisplay = document.getElementById('timer');
        
        // Clear previous test
        grid.innerHTML = '';
        let count = 0;
        let start = performance.now();

        // 1000 loop for generation
        for (let i = 1; i <= 1000; i++) {
            count++;
            
            // Create a small ticket element
            const ticket = document.createElement('div');
            ticket.className = 'mini-ticket';
            
            const txnId = "CLD-" + Math.floor(Math.random() * 900000 + 100000);
            
            ticket.innerHTML = `
                <div class="ticket-id">${txnId}</div>
                <div>User_${i}</div>
                <div style="color:green;">Verified ✓</div>
            `;
            
            grid.appendChild(ticket);
        }

        let end = performance.now();
        countDisplay.innerText = count;
        timerDisplay.innerText = `Successfully provisioned 1000 resources in ${(end - start).toFixed(2)}ms`;
        
        // Final message
        console.log("1000 Tickets synced to Virtual Cloud Storage.");
    }
</script>

</body>
</html>
